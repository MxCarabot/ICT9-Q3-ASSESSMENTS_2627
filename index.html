<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
	<title>Q3 Drill 1</title>
	<style>
		.container{
			height: 230px;
			max-width: 50%;
			background-color: #e1e3e3 ;
			text-align: center;
			font-family: Consolas;
			border-radius: 20px;
			padding: 10px;
			margin-top: 150px;
			border: 2px dotted gray;
		}
		h1{
			border: 2px dotted gray;
			background-color: #86e7f0;
			border-radius: 20px;
			font-family: Rockwell;

		}
		#display{
			font-family: Consolas;
			font-size: 50px;
		}
		button{
			background-color: #f2a191;
			border-radius: 20px;
		}
	</style>
</head>
<body>
	<div class="container">
	
	<h1>Basic Calculator</h1>
	<p id="para1">Click the button to display the product of two numbers.</p>
	

	<script>
		let a = 1; //any number data from 1 to 10
		let b = 6.7; //any decimal number from 1 to 10
		let prod = a * b; /*use an operator to get the product 
							of a and b and display output
							once the button below is clicked
						  */
	</script>

	<button type="button" onclick="document.getElementById('display').innerHTML='<kbd>' + prod + '</kbd>' ">Display</button>

	<br><br><br>

	<p id="display"></p> <!--displays outside the div for the border to touch kbd-->

	</div>
</body>
</html>
